<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تموج المقص - نظام الولاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --black: #000000; --white: #ffffff; --grey: #555555; --light-grey: #f7f7f7; --red: #ff3b30; }
  * { margin: 0; padding: 0; box-sizing: border-box; border: none !important; outline: none !important; }
  body { font-family: 'Tajawal', sans-serif; background: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .phone { width: 100%; max-width: 420px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .header { background: var(--white); padding: 30px 20px 15px; text-align: center; }
  .logo-ar { font-size: 32px; font-weight: 900; color: var(--black); cursor: pointer; -webkit-user-select: none; user-select: none; }
  .logo-sub { font-size: 12px; color: var(--grey); letter-spacing: 2px; margin-top: 4px; }
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }
  .customer-content { flex:1; padding:20px 25px; display:flex; flex-direction:column; justify-content:center; }
  .promo-banner { background: transparent; color: var(--black); padding: 10px; text-align: center; margin-bottom: 30px; }
  .promo-icon { font-size: 36px; margin-bottom: 8px; }
  .promo-text { font-size: 16px; font-weight: 700; line-height: 1.5; color: var(--black); }
  .field-label { font-size: 14px; font-weight: 700; color: var(--black); margin-bottom: 5px; display: block; padding-right: 5px; }
  .field-group { margin-bottom: 20px; }
  .field-input { width: 100%; padding: 15px 5px; font-size: 16px; font-family: 'Tajawal', sans-serif; background: transparent; color: var(--black); text-align: right; border-bottom: 1px solid #e0e0e0 !important; }
  .btn-primary { width: 100%; padding: 16px; background: transparent; color: var(--black); font-size: 18px; font-weight: 900; font-family: 'Tajawal', sans-serif; cursor: pointer; text-align: center; margin-top: 15px; }
  .btn-secondary { padding: 10px 20px; background: transparent; font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--grey); margin-top: 5px; }
  .cross-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; gap: 15px; width: 260px; height: 260px; margin: 0 auto 30px; }
  .visit-box { display: flex; align-items: center; justify-content: center; font-size: 20px; color: #b5b5b5; font-weight: 700; background: transparent; }
  .visit-box.filled { color: var(--black); font-size: 26px; font-weight: 900; }
  .alert { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-90px); background: #333; color:var(--white); padding:12px 25px; font-size:14px; font-weight:500; z-index:999; transition:transform 0.3s ease; }
  .alert.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="logo-ar" id="logo-main">تموج المقص</div>
    <div class="logo-sub">صالون الحلاقة الرجالي</div>
  </div>

  <div class="screen active" id="screen-customer">
    <div class="customer-content">
      <div class="promo-banner">
        <div class="promo-icon">✂️</div>
        <div class="promo-text">احلق 4 مرات واكسب الخامسة مجاناً!</div>
      </div>
      <div id="register-form">
        <div class="field-group">
          <label class="field-label">الاسم</label>
          <input class="field-input" id="inp-name" type="text" placeholder="أدخل اسمك الكريم">
        </div>
        <div class="field-group">
          <label class="field-label">رقم الجوال</label>
          <input class="field-input" id="inp-phone" type="tel" placeholder="05xxxxxxxx" style="direction:ltr;text-align:right;">
        </div>
        <div class="field-group">
          <label class="field-label">رقم سري (4 أرقام)</label>
          <input class="field-input" id="inp-pin" type="password" inputmode="numeric" maxlength="4" placeholder="اختر رقماً سرياً" style="direction:ltr;text-align:right;">
        </div>
        <button class="btn-primary" onclick="registerVisit()">✨ تسجيل الزيارة الآن</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-owner-login">
    <div class="customer-content">
      <h2 style="text-align:center; margin-bottom:20px;">لوحة المالك</h2>
      <input class="field-input" id="inp-pass" type="password" placeholder="كلمة المرور">
      <button class="btn-primary" onclick="ownerLogin()">دخول</button>
      <button class="btn-secondary" onclick="showScreen('screen-customer')">رجوع</button>
    </div>
  </div>

  <div class="screen" id="screen-owner">
    <div class="customer-content">
      <h2>لوحة الإدارة</h2>
      <button class="btn-primary" onclick="exportData()">تصدير البيانات</button>
      <button class="btn-secondary" onclick="showScreen('screen-customer')">خروج</button>
    </div>
  </div>
</div>

<div class="alert" id="alert-box"></div>

<script>
const STORE_KEY = 'tamouj_customers_v2';
let tapCount = 0;
document.getElementById('logo-main').addEventListener('click', () => {
  tapCount++;
  if (tapCount >= 7) { tapCount = 0; showScreen('screen-owner-login'); }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showAlert(msg) {
  const el = document.getElementById('alert-box');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function loadCustomers() { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); }

function registerVisit() {
  const name = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const pin = document.getElementById('inp-pin').value.trim();
  
  if (!name || !phone || !pin) { showAlert('الرجاء تعبئة جميع الحقول'); return; }

  const customers = loadCustomers();
  const now = new Date().toISOString();

  if (!customers[phone]) {
    customers[phone] = { name, phone, pin, visits: [] };
  }

  const c = customers[phone];
  
  // منطق الـ 3 أيام
  if (c.visits.length > 0) {
    const lastDate = new Date(c.visits[c.visits.length - 1].date);
    const diffDays = (new Date() - lastDate) / (1000 * 60 * 60 * 24);
    if (diffDays < 3) {
      showAlert('يجب انتظار 3 أيام بين كل زيارة');
      return;
    }
  }

  c.visits.push({ date: now });
  localStorage.setItem(STORE_KEY, JSON.stringify(customers));
  showAlert('تم تسجيل الزيارة بنجاح');
}

function ownerLogin() {
  if (document.getElementById('inp-pass').value === '2456') {
    showScreen('screen-owner');
  } else {
    showAlert('كلمة المرور خطأ');
  }
}

function exportData() {
  const data = localStorage.getItem(STORE_KEY);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup.json';
  a.click();
}
</script>
</body>
</html>
