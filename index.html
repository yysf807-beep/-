<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تموج المقص - نظام الولاء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --black: #000000; --white: #ffffff; --grey: #555555; --red: #ff3b30; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Tajawal', sans-serif; background: #eee; display: flex; justify-content: center; min-height: 100vh; }
  .phone { width: 100%; max-width: 420px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
  .header { padding: 30px 20px; text-align: center; }
  .logo-ar { font-size: 32px; font-weight: 900; cursor: pointer; }
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }
  .field-input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
  .btn-primary { width: 100%; padding: 15px; background: var(--black); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  .alert { position: fixed; top: 20px; background: #333; color: white; padding: 15px; border-radius: 5px; display: none; }
  .cross-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; text-align: center; }
  .visit-box { padding: 20px; background: #f0f0f0; border-radius: 50%; }
  .visit-box.filled { background: #000; color: #fff; }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <div class="logo-ar" id="logo-main" onclick="checkOwner()">تموج المقص</div>
  </div>

  <div class="screen active" id="screen-customer">
    <input class="field-input" id="inp-name" placeholder="الاسم">
    <input class="field-input" id="inp-phone" placeholder="رقم الجوال">
    <input class="field-input" id="inp-pin" type="password" placeholder="الرقم السري (4 أرقام)">
    <button class="btn-primary" onclick="registerVisit()">تسجيل الزيارة</button>
  </div>

  <div class="screen" id="screen-card">
    <div class="cross-grid" id="grid"></div>
    <button class="btn-primary" onclick="showScreen('screen-customer')">رجوع</button>
  </div>

  <div class="screen" id="screen-owner">
    <h2>لوحة المالك</h2>
    <button class="btn-primary" onclick="exportData()">تصدير البيانات (JSON)</button>
    <button class="btn-primary" onclick="showScreen('screen-customer')">خروج</button>
  </div>
</div>

<div id="alert" class="alert"></div>

<script>
  let customers = JSON.parse(localStorage.getItem('tamouj_data')) || {};

  function showAlert(msg) {
    const a = document.getElementById('alert');
    a.textContent = msg; a.style.display = 'block';
    setTimeout(() => a.style.display = 'none', 3000);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function registerVisit() {
    const phone = document.getElementById('inp-phone').value;
    const name = document.getElementById('inp-name').value;
    const now = new Date();

    if(!customers[phone]) customers[phone] = {name, visits: []};
    
    // شرط الـ 3 أيام
    if(customers[phone].visits.length > 0) {
      const last = new Date(customers[phone].visits[customers[phone].visits.length - 1]);
      const diff = (now - last) / (1000 * 60 * 60 * 24);
      if(diff < 3) { showAlert('يجب انتظار 3 أيام بين كل زيارة'); return; }
    }

    customers[phone].visits.push(now.toISOString());
    localStorage.setItem('tamouj_data', JSON.stringify(customers));
    renderCard(phone);
    showScreen('screen-card');
  }

  function renderCard(phone) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for(let i=0; i<5; i++) {
      grid.innerHTML += `<div class="visit-box ${i < customers[phone].visits.length ? 'filled' : ''}">✓</div>`;
    }
  }

  function checkOwner() { if(prompt('كلمة مرور المالك:') === '2456') showScreen('screen-owner'); }
  
  function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customers));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "data.json");
    dl.click();
  }
</script>
</body>
</html>
